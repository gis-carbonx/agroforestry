<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SIG Lahan Garapan — Agroforestry & Tembawang</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
  :root {
    --agro-reg: #2d8a4e;
    --agro-bpo: #2563eb;
    --temb-reg: #d97706;
    --temb-mtl: #7c3aed;
    --bg: #f4f6f5;
    --surface: #ffffff;
    --border: #e2e8e4;
    --text: #1a2e22;
    --text-muted: #6b7f72;
    --sidebar-w: 320px;
    --header-h: 56px;
    --shadow: 0 1px 4px rgba(0,0,0,.08), 0 4px 16px rgba(0,0,0,.06);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── HEADER ── */
  header {
    height: var(--header-h);
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 20px;
    gap: 12px;
    flex-shrink: 0;
    z-index: 900;
  }
  .logo-icon {
    width: 32px; height: 32px;
    background: linear-gradient(135deg, #2d8a4e, #4ade80);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
  }
  .logo-text { font-weight: 600; font-size: 15px; line-height: 1.2; }
  .logo-sub { font-size: 11px; color: var(--text-muted); font-weight: 400; }
  .header-right { margin-left: auto; display: flex; gap: 8px; align-items: center; }

  /* Search */
  .search-wrap {
    position: relative;
  }
  .search-wrap input {
    width: 240px;
    padding: 7px 12px 7px 34px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 13px;
    font-family: inherit;
    background: var(--bg);
    outline: none;
    transition: border-color .15s;
  }
  .search-wrap input:focus { border-color: var(--agro-reg); background: #fff; }
  .search-wrap .search-icon {
    position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
    color: var(--text-muted); pointer-events: none; font-size: 14px;
  }
  .search-results {
    position: absolute; top: calc(100% + 4px); left: 0; right: 0;
    background: #fff; border: 1px solid var(--border); border-radius: 8px;
    box-shadow: var(--shadow); z-index: 999; max-height: 220px; overflow-y: auto;
    display: none;
  }
  .search-results.show { display: block; }
  .search-item {
    padding: 8px 12px; cursor: pointer; font-size: 12px;
    border-bottom: 1px solid var(--border);
    transition: background .1s;
  }
  .search-item:last-child { border-bottom: none; }
  .search-item:hover { background: var(--bg); }
  .search-item strong { display: block; font-size: 13px; }
  .search-item span { color: var(--text-muted); }

  /* ── MAIN LAYOUT ── */
  .main {
    flex: 1;
    display: flex;
    overflow: hidden;
  }

  /* ── SIDEBAR ── */
  .sidebar {
    width: var(--sidebar-w);
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    flex-shrink: 0;
  }

  .sidebar-inner {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .sidebar-inner::-webkit-scrollbar { width: 4px; }
  .sidebar-inner::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  /* Stat cards */
  .stat-group { display: flex; flex-direction: column; gap: 8px; }
  .stat-section-title {
    font-size: 10px; font-weight: 600; letter-spacing: .08em;
    text-transform: uppercase; color: var(--text-muted); margin-bottom: 2px;
  }
  .stat-row { display: flex; gap: 8px; }
  .stat-card {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 12px;
  }
  .stat-card .label { font-size: 10px; color: var(--text-muted); margin-bottom: 4px; }
  .stat-card .value {
    font-size: 18px; font-weight: 600; line-height: 1;
    font-family: 'DM Mono', monospace;
  }
  .stat-card .unit { font-size: 11px; color: var(--text-muted); margin-left: 2px; }
  .stat-card.accent-green .value { color: var(--agro-reg); }
  .stat-card.accent-orange .value { color: var(--temb-reg); }
  .stat-card.accent-blue .value { color: var(--agro-bpo); }
  .stat-card.full { border-radius: 10px; background: linear-gradient(135deg, #f0fdf4, #dcfce7); }
  .stat-card.full .value { font-size: 22px; color: var(--text); }

  /* Divider */
  .divider { height: 1px; background: var(--border); }

  /* Filters */
  .filter-row { display: flex; gap: 6px; flex-wrap: wrap; }
  .filter-btn {
    padding: 5px 11px; border-radius: 20px; font-size: 11px; font-weight: 500;
    border: 1px solid var(--border); background: var(--bg); cursor: pointer;
    font-family: inherit; color: var(--text-muted); transition: all .15s;
    white-space: nowrap;
  }
  .filter-btn:hover, .filter-btn.active { color: #fff; border-color: transparent; }
  .filter-btn[data-prog="all"].active { background: var(--text); }
  .filter-btn[data-prog="Agro Reguler"].active { background: var(--agro-reg); }
  .filter-btn[data-prog="Agro BPO"].active { background: var(--agro-bpo); }
  .filter-btn[data-prog="Tembawang Reguler"].active { background: var(--temb-reg); }
  .filter-btn[data-prog="Tembawang MTL"].active { background: var(--temb-mtl); }

  select.kth-select {
    width: 100%; padding: 7px 10px; font-size: 12px; font-family: inherit;
    border: 1px solid var(--border); border-radius: 8px; background: var(--bg);
    color: var(--text); outline: none; cursor: pointer;
  }
  select.kth-select:focus { border-color: var(--agro-reg); background: #fff; }

  /* KTH list */
  .kth-list { display: flex; flex-direction: column; gap: 6px; }
  .kth-card {
    border: 1px solid var(--border); border-radius: 10px; padding: 10px 12px;
    cursor: pointer; transition: all .15s; background: var(--bg);
  }
  .kth-card:hover { border-color: var(--agro-reg); background: #f0fdf4; }
  .kth-card.active { border-color: var(--agro-reg); background: #f0fdf4; }
  .kth-card .kth-name { font-weight: 600; font-size: 13px; margin-bottom: 6px; }
  .kth-card .kth-stats { display: flex; gap: 8px; flex-wrap: wrap; }
  .kth-badge {
    font-size: 10px; padding: 2px 7px; border-radius: 10px; font-weight: 500;
  }
  .kth-badge.agro { background: #dcfce7; color: var(--agro-reg); }
  .kth-badge.temb { background: #fff7ed; color: var(--temb-reg); }
  .kth-badge.total { background: #f1f5f9; color: #475569; }

  /* Legend */
  .legend-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 11px; }
  .legend-dot {
    width: 12px; height: 12px; border-radius: 3px; flex-shrink: 0;
    border: 2px solid rgba(255,255,255,.6);
  }

  /* Loading */
  .loading-bar {
    padding: 20px; text-align: center; color: var(--text-muted); font-size: 13px;
  }
  .spinner {
    width: 20px; height: 20px; border: 2px solid var(--border);
    border-top-color: var(--agro-reg); border-radius: 50%;
    animation: spin .8s linear infinite; margin: 0 auto 8px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── MAP ── */
  #map {
    flex: 1;
    z-index: 1;
  }

  /* Leaflet popup override */
  .leaflet-popup-content-wrapper {
    border-radius: 12px !important;
    padding: 0 !important;
    box-shadow: 0 4px 24px rgba(0,0,0,.15) !important;
    min-width: 260px;
    max-width: 300px;
    overflow: hidden;
  }
  .leaflet-popup-content { margin: 0 !important; }
  .popup-inner { padding: 14px 16px; }
  .popup-badge {
    display: inline-block; font-size: 10px; font-weight: 600;
    padding: 2px 8px; border-radius: 10px; margin-bottom: 10px;
    text-transform: uppercase; letter-spacing: .05em;
  }
  .popup-badge.agro-reg { background: #dcfce7; color: var(--agro-reg); }
  .popup-badge.agro-bpo { background: #dbeafe; color: var(--agro-bpo); }
  .popup-badge.temb-reg { background: #fff7ed; color: var(--temb-reg); }
  .popup-badge.temb-mtl { background: #f3e8ff; color: var(--temb-mtl); }
  .popup-row {
    display: flex; justify-content: space-between; align-items: baseline;
    padding: 4px 0; border-bottom: 1px solid var(--border); font-size: 12px;
  }
  .popup-row:last-child { border-bottom: none; }
  .popup-row .pk { color: var(--text-muted); }
  .popup-row .pv { font-weight: 500; text-align: right; max-width: 160px; }

  /* Zoom ctrl */
  .leaflet-control-zoom { border: 1px solid var(--border) !important; border-radius: 8px !important; }
  .leaflet-control-zoom a { font-size: 16px !important; color: var(--text) !important; }

  /* Status badge */
  #status-bar {
    position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%);
    background: rgba(0,0,0,.75); color: #fff; padding: 6px 14px;
    border-radius: 20px; font-size: 12px; z-index: 800; display: none;
    backdrop-filter: blur(4px);
  }
  #status-bar.show { display: block; }
</style>
</head>
<body>

<header>
  <div class="logo-icon">🌿</div>
  <div>
    <div class="logo-text">SIG Lahan Garapan Masyarakat</div>
    <div class="logo-sub">Agroforestry & Tembawang — PT CMI</div>
  </div>
  <div class="header-right">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="Cari petani, ID petak, KTH…">
      <div class="search-results" id="searchResults"></div>
    </div>
  </div>
</header>

<div class="main">
  <div class="sidebar">
    <div class="sidebar-inner" id="sidebarContent">
      <div class="loading-bar">
        <div class="spinner"></div>
        Memuat data…
      </div>
    </div>
  </div>
  <div id="map"></div>
</div>
<div id="status-bar"></div>

<script>
// ─── CONFIG ───────────────────────────────────────────────────────────────────
const SHEET_CSV = 'https://docs.google.com/spreadsheets/d/1ZWVhzR7k27Hb3hHorIfBvkglzRN8PH1YDsk4EUhCgx8/gviz/tq?tqx=out:csv&sheet=ARR_SUMMARY';
const AGRO_JSON = 'https://raw.githubusercontent.com/gis-carbonx/agroforestry/main/data/agro.json';
const CMI_JSON  = 'https://raw.githubusercontent.com/gis-carbonx/agroforestry/main/data/CMI.json';

const PROG_COLORS = {
  'Agro Reguler':       { fill: '#2d8a4e', border: '#1a5c33' },
  'Agro BPO':           { fill: '#2563eb', border: '#1d4ed8' },
  'Tembawang Reguler':  { fill: '#d97706', border: '#92400e' },
  'Tembawang MTL':      { fill: '#7c3aed', border: '#5b21b6' },
};

// ─── STATE ────────────────────────────────────────────────────────────────────
let allData = [];         // joined rows
let geoLayer = null;
let map, cmiLayer;
let activeFilter = 'all';
let activeKTH = null;

// ─── INIT MAP ─────────────────────────────────────────────────────────────────
map = L.map('map', { zoomControl: false, preferCanvas: true }).setView([0, 110], 7);
L.control.zoom({ position: 'topleft' }).addTo(map);

L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; CartoDB &copy; OSM',
  subdomains: 'abcd', maxZoom: 20
}).addTo(map);

// ─── LOAD DATA ────────────────────────────────────────────────────────────────
async function loadAll() {
  try {
    const [csvText, agro, cmi] = await Promise.all([
      fetchText(SHEET_CSV),
      fetchJSON(AGRO_JSON),
      fetchJSON(CMI_JSON),
    ]);

    // Parse CSV
    const parsed = Papa.parse(csvText, { header: true, skipEmptyLines: true });
    const rows = parsed.data;

    // Build lookup: id_petak → row
    const csvMap = {};
    rows.forEach(r => {
      const id = (r['ID_Petak'] || r['H'] || '').trim();
      if (id) csvMap[id] = r;
    });

    // Join GeoJSON features
    const joined = [];
    (agro.features || []).forEach(feat => {
      const props = feat.properties || {};
      const geoId = (props.id_lahan || props.ID_Petak || '').trim();
      const csvRow = csvMap[geoId];
      if (!geoId || !csvRow) return; // skip unmatched

      // Determine program
      let program = null;
      const agroReg = parseFloat(csvRow['Agro_Reg'] || csvRow['J'] || '');
      const agroBpo = parseFloat(csvRow['Agro_BPO'] || csvRow['K'] || '');
      const tembReg = parseFloat(csvRow['Temb_Reg'] || csvRow['L'] || '');
      const tembMtl = parseFloat(csvRow['Temb_MTL'] || csvRow['M'] || '');
      const luas = parseFloat(csvRow['Luas'] || csvRow['D'] || '');

      if (!isNaN(agroReg) && agroReg > 0) program = 'Agro Reguler';
      else if (!isNaN(agroBpo) && agroBpo > 0) program = 'Agro BPO';
      else if (!isNaN(tembReg) && tembReg > 0) program = 'Tembawang Reguler';
      else if (!isNaN(tembMtl) && tembMtl > 0) program = 'Tembawang MTL';
      if (!program) return;

      joined.push({
        feature: feat,
        id: geoId,
        petani: (csvRow['Petani'] || csvRow['E'] || csvRow['Nama Petani'] || '').trim(),
        kth: (csvRow['KTH'] || csvRow['C'] || '').trim(),
        program,
        luas: isNaN(luas) ? 0 : luas,
        desa: (csvRow['Desa'] || csvRow['G'] || '').trim(),
        grid: (csvRow['Grid'] || csvRow['B'] || '').trim(),
        tgl: (csvRow['Tgl_Realisasi'] || csvRow['I'] || '').trim(),
        jk: (csvRow['Jenis Kelamin'] || csvRow['F'] || '').trim(),
        props,
      });
    });

    allData = joined;

    // Draw CMI boundary
    if (cmi && cmi.features) {
      cmiLayer = L.geoJSON(cmi, {
        style: { color: '#334155', weight: 2, dashArray: '6 4', fill: false, opacity: .7 }
      }).addTo(map);
    }

    buildSidebar();
    renderPolygons();

    // Fit map to data
    if (geoLayer && geoLayer.getLayers().length > 0) {
      try { map.fitBounds(geoLayer.getBounds().pad(.05)); } catch(e) {}
    } else if (cmiLayer) {
      try { map.fitBounds(cmiLayer.getBounds().pad(.05)); } catch(e) {}
    }

  } catch(err) {
    console.error(err);
    document.getElementById('sidebarContent').innerHTML =
      `<div class="loading-bar" style="color:#ef4444">Gagal memuat data.<br><small>${err.message}</small></div>`;
  }
}

async function fetchText(url) {
  const r = await fetch(url); if (!r.ok) throw new Error('Fetch failed: ' + url); return r.text();
}
async function fetchJSON(url) {
  const r = await fetch(url); if (!r.ok) throw new Error('Fetch failed: ' + url); return r.json();
}

// ─── RENDER POLYGONS ──────────────────────────────────────────────────────────
function renderPolygons() {
  if (geoLayer) map.removeLayer(geoLayer);

  const filtered = allData.filter(d => {
    if (activeFilter !== 'all' && d.program !== activeFilter) return false;
    if (activeKTH && d.kth !== activeKTH) return false;
    return true;
  });

  const features = filtered.map(d => ({
    type: 'Feature',
    geometry: d.feature.geometry,
    properties: d,
  }));

  geoLayer = L.geoJSON({ type: 'FeatureCollection', features }, {
    style: f => {
      const c = PROG_COLORS[f.properties.program] || { fill: '#888', border: '#555' };
      return { color: c.border, weight: 1.5, fillColor: c.fill, fillOpacity: .65, opacity: 1 };
    },
    onEachFeature: (f, layer) => {
      layer.on({
        mouseover(e) {
          e.target.setStyle({ fillOpacity: .85, weight: 2.5 });
          e.target.bringToFront();
        },
        mouseout(e) {
          geoLayer.resetStyle(e.target);
        },
        click(e) {
          showPopup(e.target, f.properties);
        }
      });
    }
  }).addTo(map);
}

function showPopup(layer, d) {
  const progClass = {
    'Agro Reguler': 'agro-reg', 'Agro BPO': 'agro-bpo',
    'Tembawang Reguler': 'temb-reg', 'Tembawang MTL': 'temb-mtl',
  }[d.program] || '';

  const rows = [
    ['ID Petak', d.id],
    ['Nama Petani', d.petani || '-'],
    ['KTH', d.kth || '-'],
    ['Program', d.program],
    ['Luas', d.luas + ' ha'],
    ['Desa', d.desa || '-'],
    ['Jenis Kelamin', d.jk || '-'],
    ['Grid', d.grid || '-'],
    ['Tgl Realisasi', d.tgl || '-'],
  ];

  const html = `
    <div class="popup-inner">
      <span class="popup-badge ${progClass}">${d.program}</span>
      ${rows.map(([k,v]) => `<div class="popup-row"><span class="pk">${k}</span><span class="pv">${v}</span></div>`).join('')}
    </div>`;

  layer.bindPopup(html, { maxWidth: 300 }).openPopup();
}

// ─── SIDEBAR ──────────────────────────────────────────────────────────────────
function buildSidebar() {
  const visible = allData.filter(d => {
    if (activeFilter !== 'all' && d.program !== activeFilter) return false;
    if (activeKTH && d.kth !== activeKTH) return false;
    return true;
  });

  const isAgro = d => d.program === 'Agro Reguler' || d.program === 'Agro BPO';
  const isTemb = d => d.program === 'Tembawang Reguler' || d.program === 'Tembawang MTL';

  const totalLuas = sum(visible, d => d.luas);
  const agLuas = sum(visible.filter(isAgro), d => d.luas);
  const tbLuas = sum(visible.filter(isTemb), d => d.luas);
  const petaniSet = new Set(visible.map(d => d.petani).filter(Boolean));
  const petaniAgSet = new Set(visible.filter(isAgro).map(d => d.petani).filter(Boolean));
  const petaniTbSet = new Set(visible.filter(isTemb).map(d => d.petani).filter(Boolean));
  const kthSet = new Set(visible.map(d => d.kth).filter(Boolean));

  // KTH groups
  const kthGroups = {};
  visible.forEach(d => {
    if (!d.kth) return;
    if (!kthGroups[d.kth]) kthGroups[d.kth] = { agro: 0, temb: 0, total: 0 };
    if (isAgro(d)) kthGroups[d.kth].agro += d.luas;
    if (isTemb(d)) kthGroups[d.kth].temb += d.luas;
    kthGroups[d.kth].total += d.luas;
  });

  // All KTH for dropdown
  const allKTH = [...new Set(allData.map(d => d.kth).filter(Boolean))].sort();

  document.getElementById('sidebarContent').innerHTML = `
    <!-- Stats -->
    <div class="stat-group">
      <div class="stat-section-title">Total Lahan Garapan</div>
      <div class="stat-card full">
        <div class="label">Keseluruhan</div>
        <div class="value">${fmt(totalLuas)}<span class="unit">ha</span></div>
      </div>
      <div class="stat-row">
        <div class="stat-card accent-green">
          <div class="label">Agroforestry</div>
          <div class="value">${fmt(agLuas)}<span class="unit">ha</span></div>
        </div>
        <div class="stat-card accent-orange">
          <div class="label">Tembawang</div>
          <div class="value">${fmt(tbLuas)}<span class="unit">ha</span></div>
        </div>
      </div>
    </div>

    <div class="divider"></div>

    <div class="stat-group">
      <div class="stat-section-title">Anggota Terdaftar</div>
      <div class="stat-row">
        <div class="stat-card accent-blue">
          <div class="label">Total Anggota</div>
          <div class="value">${petaniSet.size}</div>
        </div>
        <div class="stat-card">
          <div class="label">Jumlah KTH</div>
          <div class="value">${kthSet.size}</div>
        </div>
      </div>
      <div class="stat-row">
        <div class="stat-card accent-green">
          <div class="label">Agro</div>
          <div class="value">${petaniAgSet.size}</div>
        </div>
        <div class="stat-card accent-orange">
          <div class="label">Tembawang</div>
          <div class="value">${petaniTbSet.size}</div>
        </div>
      </div>
    </div>

    <div class="divider"></div>

    <!-- Filter Program -->
    <div>
      <div class="stat-section-title" style="margin-bottom:8px">Filter Program</div>
      <div class="filter-row">
        <button class="filter-btn ${activeFilter==='all'?'active':''}" data-prog="all" onclick="setFilter('all')">Semua</button>
        <button class="filter-btn ${activeFilter==='Agro Reguler'?'active':''}" data-prog="Agro Reguler" onclick="setFilter('Agro Reguler')">Agro Reguler</button>
        <button class="filter-btn ${activeFilter==='Agro BPO'?'active':''}" data-prog="Agro BPO" onclick="setFilter('Agro BPO')">Agro BPO</button>
        <button class="filter-btn ${activeFilter==='Tembawang Reguler'?'active':''}" data-prog="Tembawang Reguler" onclick="setFilter('Tembawang Reguler')">Temb. Reguler</button>
        <button class="filter-btn ${activeFilter==='Tembawang MTL'?'active':''}" data-prog="Tembawang MTL" onclick="setFilter('Tembawang MTL')">Temb. MTL</button>
      </div>
    </div>

    <!-- Filter KTH -->
    <div>
      <div class="stat-section-title" style="margin-bottom:6px">Filter KTH</div>
      <select class="kth-select" onchange="setKTH(this.value)">
        <option value="">— Semua KTH —</option>
        ${allKTH.map(k => `<option value="${k}" ${activeKTH===k?'selected':''}>${k}</option>`).join('')}
      </select>
    </div>

    <div class="divider"></div>

    <!-- KTH List -->
    <div>
      <div class="stat-section-title" style="margin-bottom:8px">KTH Terdaftar (${Object.keys(kthGroups).length})</div>
      <div class="kth-list">
        ${Object.entries(kthGroups).sort((a,b)=>b[1].total-a[1].total).map(([name, s]) => `
          <div class="kth-card ${activeKTH===name?'active':''}" onclick="zoomKTH('${esc(name)}')">
            <div class="kth-name">${name}</div>
            <div class="kth-stats">
              ${s.agro>0?`<span class="kth-badge agro">Agro ${fmt(s.agro)} ha</span>`:''}
              ${s.temb>0?`<span class="kth-badge temb">Temb ${fmt(s.temb)} ha</span>`:''}
              <span class="kth-badge total">${fmt(s.total)} ha</span>
            </div>
          </div>`).join('')}
      </div>
    </div>

    <div class="divider"></div>

    <!-- Legend -->
    <div>
      <div class="stat-section-title" style="margin-bottom:8px">Legenda</div>
      <div class="legend-grid">
        ${Object.entries(PROG_COLORS).map(([name, c]) =>
          `<div class="legend-item"><div class="legend-dot" style="background:${c.fill}"></div><span>${name}</span></div>`
        ).join('')}
        <div class="legend-item"><div style="width:12px;height:12px;border:2px dashed #334155;flex-shrink:0"></div><span>Batas CMI</span></div>
      </div>
    </div>
  `;
}

// ─── INTERACTIONS ─────────────────────────────────────────────────────────────
function setFilter(prog) {
  activeFilter = prog;
  buildSidebar();
  renderPolygons();
}

function setKTH(kth) {
  activeKTH = kth || null;
  buildSidebar();
  renderPolygons();
  if (activeKTH) zoomKTH(activeKTH, false);
}

function zoomKTH(kthName, toggle = true) {
  if (toggle && activeKTH === kthName) {
    activeKTH = null;
  } else {
    activeKTH = kthName;
  }
  buildSidebar();
  renderPolygons();

  // Zoom to KTH features
  const pts = [];
  if (geoLayer) {
    geoLayer.eachLayer(l => {
      try { pts.push(...l.getLatLngs().flat(Infinity)); } catch(e) {}
    });
  }
  if (pts.length > 0) {
    try {
      const bounds = L.latLngBounds(pts);
      map.fitBounds(bounds.pad(.1));
    } catch(e) {}
  }

  // Highlight briefly
  if (geoLayer) {
    geoLayer.eachLayer(l => {
      l.setStyle({ weight: 3, fillOpacity: .9 });
      setTimeout(() => { if (geoLayer) geoLayer.resetStyle(l); }, 1200);
    });
  }
}

// ─── SEARCH ───────────────────────────────────────────────────────────────────
const searchInput = document.getElementById('searchInput');
const searchResults = document.getElementById('searchResults');

searchInput.addEventListener('input', () => {
  const q = searchInput.value.trim().toLowerCase();
  if (q.length < 2) { searchResults.classList.remove('show'); return; }

  const hits = allData.filter(d =>
    (d.petani || '').toLowerCase().includes(q) ||
    (d.id || '').toLowerCase().includes(q) ||
    (d.kth || '').toLowerCase().includes(q)
  ).slice(0, 10);

  if (!hits.length) { searchResults.classList.remove('show'); return; }

  searchResults.innerHTML = hits.map(d => `
    <div class="search-item" onclick="zoomToFeature('${esc(d.id)}')">
      <strong>${d.petani || d.id}</strong>
      <span>${d.id} · ${d.kth} · ${d.program}</span>
    </div>`).join('');
  searchResults.classList.add('show');
});

document.addEventListener('click', e => {
  if (!searchInput.contains(e.target) && !searchResults.contains(e.target)) {
    searchResults.classList.remove('show');
  }
});

function zoomToFeature(id) {
  searchResults.classList.remove('show');
  searchInput.value = '';
  if (!geoLayer) return;
  geoLayer.eachLayer(l => {
    if (l.feature && l.feature.properties && l.feature.properties.id === id) {
      try { map.fitBounds(l.getBounds().pad(.2)); } catch(e) {}
      showPopup(l, l.feature.properties);
    }
  });
}

// ─── UTILS ────────────────────────────────────────────────────────────────────
function sum(arr, fn) { return arr.reduce((a, d) => a + (fn(d) || 0), 0); }
function fmt(n) { return (Math.round(n * 100) / 100).toLocaleString('id-ID', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }
function esc(s) { return (s || '').replace(/'/g, "\\'"); }

// ─── START ────────────────────────────────────────────────────────────────────
loadAll();
</script>
